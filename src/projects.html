<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Christian Ashley - Projects</title>
  <style>
    :root {
      --color-background: #ffffff;
      --color-text: #000000;
      --color-text-light: #333333;
      --color-accent: #333333;
      --color-accent-hover: #000000;
      --color-border: #d7d7d717;
      --font-serif: 'Georgia', 'Garamond', serif;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-sans);
      background: var(--color-background);
      color: var(--color-text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* Navigation */
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--color-border);
      padding: 24px 0;
      z-index: 1000;
    }

    nav .nav-wrapper {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-logo {
      font-family: var(--font-serif);
      font-size: 18px;
      font-weight: 400;
      letter-spacing: 0.5px;
      color: var(--color-text);
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 48px;
      list-style: none;
    }

    .nav-links a {
      color: var(--color-text-light);
      text-decoration: none;
      font-size: 14px;
      transition: color 0.3s;
    }

    .nav-links a:hover {
      color: var(--color-text);
    }

    /* Container */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 120px 24px 64px;
    }

    /* Header */
    .page-header {
      text-align: center;
      margin-bottom: 64px;
    }

    .page-header h1 {
      font-family: var(--font-serif);
      font-size: 48px;
      font-weight: 400;
      margin-bottom: 16px;
      letter-spacing: -0.5px;
    }

    .page-header p {
      font-size: 18px;
      color: var(--color-text-light);
      max-width: 600px;
      margin: 0 auto;
    }

    /* Filter Buttons */
    .filter-buttons {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 48px;
    }

    .filter-btn {
      background: white;
      border: 1px solid var(--color-border);
      padding: 10px 24px;
      font-size: 14px;
      font-weight: 500;
      color: var(--color-text);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .filter-btn:hover {
      border-color: var(--color-accent);
      color: var(--color-accent);
    }

    .filter-btn.active {
      background: var(--color-accent);
      color: white;
      border-color: var(--color-accent);
    }

    /* Projects Grid */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 32px;
      margin-bottom: 48px;
    }

    .project-card {
      background: white;
      border: 1px solid var(--color-border);
      overflow: hidden;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
    }

    .project-card:hover {
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
      transform: translateY(-4px);
    }

    .project-image {
      width: 100%;
      height: 220px;
      background: #333333;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 14px;
      position: relative;
      overflow: hidden;
    }

    .project-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .project-tag {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(255, 255, 255, 0.95);
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 600;
      color: var(--color-accent);
    }

    .project-content {
      padding: 24px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .project-title {
      font-family: var(--font-serif);
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--color-text);
    }

    .project-description {
      font-size: 14px;
      color: var(--color-text-light);
      line-height: 1.7;
      margin-bottom: 20px;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .view-details-btn {
      background: var(--color-accent);
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      width: 100%;
    }

    .view-details-btn:hover {
      background: var(--color-accent-hover);
      transform: translateY(-2px);
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: 2000;
      overflow-y: auto;
      padding: 40px 20px;
    }

    .modal.active {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: var(--color-background);
      max-width: 800px;
      width: 100%;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      position: relative;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .modal-header {
      position: relative;
      height: 300px;
      background: #333333;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      overflow: hidden;
    }

    .modal-header img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .close-modal {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 40px;
      height: 40px;
      background: rgba(0, 0, 0, 0.5);
      border: none;
      color: white;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      z-index: 10;
    }

    .close-modal:hover {
      background: rgba(0, 0, 0, 0.8);
      transform: rotate(90deg);
    }

    .modal-body {
      padding: 40px;
    }

    .modal-tag {
      display: inline-block;
      background: var(--color-accent);
      color: white;
      padding: 6px 16px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .modal-body h2 {
      font-family: var(--font-serif);
      font-size: 32px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--color-text);
    }

    .modal-body .full-description {
      font-size: 16px;
      color: var(--color-text-light);
      line-height: 1.8;
      margin-bottom: 24px;
    }

    .modal-body .project-details {
      border-top: 1px solid var(--color-border);
      padding-top: 24px;
    }

    .modal-body .project-details h3 {
      font-family: var(--font-serif);
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .modal-body .project-details ul {
      list-style: none;
      color: var(--color-text-light);
      font-size: 15px;
      line-height: 1.9;
    }

    .modal-body .project-details li:before {
      content: "→";
      margin-right: 12px;
      color: var(--color-accent);
      font-weight: bold;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .nav-links {
        gap: 24px;
      }

      .nav-links a {
        font-size: 13px;
      }

      .container {
        padding-top: 100px;
      }

      .page-header h1 {
        font-size: 36px;
      }

      .projects-grid {
        grid-template-columns: 1fr;
        gap: 24px;
      }

      .modal-body {
        padding: 24px;
      }

      .modal-body h2 {
        font-size: 24px;
      }
    }
  </style>
</head>

<body>
  <!-- Navigation -->
  <nav>
    <div class="nav-wrapper">
      <a href="index.html" class="nav-logo">Christian Ashley</a>
      <ul class="nav-links">
        <li><a href="/index.html">Home</a></li>
        <li><a href="projects.html">Projects</a></li>
      </ul>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="container">
    <!-- Header -->
    <div class="page-header">
      <h1>My Projects</h1>
      <p>A curated collection of design work spanning web, mobile, branding, and digital experiences.</p>
    </div>

    <!-- Filter Buttons -->
    <div class="filter-buttons">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="web">Web</button>
      <button class="filter-btn" data-filter="mobile">Mobile</button>
      <button class="filter-btn" data-filter="graphic">Graphic Design</button>
      <button class="filter-btn" data-filter="branding">Branding</button>
      <button class="filter-btn" data-filter="email">Email Templates</button>
    </div>

    <!-- Projects Grid -->
    <div class="projects-grid" id="projectsGrid"></div>
  </div>

  <!-- Modal -->
  <div class="modal" id="projectModal">
    <div class="modal-content">
      <button class="close-modal" onclick="closeModal()">&times;</button>
      <div class="modal-header" id="modalHeader">
        <span>Project Image</span>
      </div>
      <div class="modal-body">
        <span class="modal-tag" id="modalTag"></span>
        <h2 id="modalTitle"></h2>
        <p class="full-description" id="modalDescription"></p>
        <div class="project-details">
          <h3>Key Features</h3>
          <ul id="modalFeatures"></ul>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Projects Data (update image paths to your real files)
    const projects = [
      {
        id: 1,
        title: "Payment Pages Platform",
        category: "web",
        tag: "Web",
        shortDescription: "A comprehensive payment platform enabling users to generate customizable payment links and QR codes with advanced form builder capabilities.",
        fullDescription: "Led the end-to-end design of Payswitch Payment Pages, a web application that revolutionized how businesses collect payments online. The platform features an intuitive drag-and-drop form builder, real-time payment tracking, and comprehensive analytics dashboard. Through extensive user research and iterative testing, we achieved a 45% improvement in task completion rates.",
        features: [
          "Drag-and-drop form builder with 15+ field types",
          "Real-time payment tracking and notifications",
          "Customizable branding and themes",
          "QR code generation for contactless payments",
          "Analytics dashboard with conversion metrics"
        ],
        image: "/asserts/images/paymentPages.png"
      },
      {
        id: 2,
        title: "Cleva Mobile App",
        category: "mobile",
        tag: "Mobile",
        shortDescription: "A fintech mobile application serving 10K+ users with innovative payment solutions including NFC technology integration.",
        fullDescription: "Designed the complete mobile experience for Cleva, a financial app that simplifies payment collection and remittances. Implemented user-centric features including NFC tap-to-pay, dynamic payment links, and streamlined transaction workflows. Conducted 15+ user interviews to validate design decisions and optimize the user journey across 3 different user personas.",
        features: [
          "NFC-enabled tap-to-pay functionality",
          "Dynamic payment link generation",
          "Multi-currency support with real-time conversion",
          "Biometric authentication for enhanced security",
          "In-app transaction history and reporting"
        ],
        image: "images/cleva-app.jpg"
      },
      {
        id: 3,
        title: "Chickeninn Brand Campaign",
        category: "graphic",
        tag: "Graphic Design",
        shortDescription: "Premium brand visual design campaign for Simbisa Africa's Chickeninn franchise across digital and print media.",
        fullDescription: "Created a comprehensive visual campaign for Chickeninn, maintaining brand consistency while infusing creative direction to elevate brand perception. Delivered 50+ assets including social media graphics, menu boards, promotional materials, and in-store displays using Adobe Creative Suite.",
        features: [
          "Social media content strategy and design",
          "Print materials (menus, posters, banners)",
          "In-store visual merchandising designs",
          "Digital advertising campaigns",
          "Brand guidelines documentation"
        ],
        image: "images/chickeninn.jpg"
      },
      {
        id: 4,
        title: "E-commerce Platform UI",
        category: "web",
        tag: "Web",
        shortDescription: "Modern, responsive e-commerce interface designed for optimal conversion and seamless shopping experience.",
        fullDescription: "Designed a complete e-commerce platform focusing on user experience, accessibility, and conversion optimization. Implemented responsive design principles ensuring consistent experience across all devices. Achieved 35% improvement in page load times through optimized design specifications.",
        features: [
          "Responsive design for mobile, tablet, and desktop",
          "Advanced product filtering and search",
          "Streamlined checkout process (3 steps)",
          "Product recommendations engine",
          "Accessibility compliance (WCAG 2.1 AA)"
        ],
        image: "images/ecommerce-ui.jpg"
      },
      {
        id: 5,
        title: "Guinness Ghana Rebrand",
        category: "branding",
        tag: "Branding",
        shortDescription: "Complete brand identity refresh for Guinness Ghana including logo evolution, color palette, and brand guidelines.",
        fullDescription: "Led the brand refresh project for Guinness Ghana, modernizing their visual identity while respecting brand heritage. Developed comprehensive brand guidelines covering logo usage, typography, color systems, and application across various touchpoints.",
        features: [
          "Logo evolution and refinement",
          "Color palette expansion with accessibility focus",
          "Typography system with web/print specifications",
          "Comprehensive brand guidelines (60+ pages)",
          "Application mockups for packaging and marketing"
        ],
        image: "images/guinness-rebrand.jpg"
      },
      {
        id: 6,
        title: "SaaS Newsletter System",
        category: "email",
        tag: "Email Templates",
        shortDescription: "Responsive email template system for SaaS product updates, onboarding sequences, and customer engagement.",
        fullDescription: "Designed a modular email template system for a SaaS product, ensuring consistent branding across all customer touchpoints. Templates are fully responsive, accessible, and optimized for major email clients including Gmail, Outlook, and Apple Mail.",
        features: [
          "12 unique template designs (onboarding, updates, promotions)",
          "Responsive design tested across 15+ email clients",
          "Modular components for easy customization",
          "Dark mode support for better accessibility",
          "A/B testing variations for optimization"
        ],
        image: "images/saas-newsletters.jpg"
      },
      {
        id: 7,
        title: "Fintech Dashboard",
        category: "web",
        tag: "Web",
        shortDescription: "Comprehensive analytics dashboard for financial data visualization with real-time updates and custom reporting.",
        fullDescription: "Designed an intuitive analytics dashboard for a fintech platform, focusing on data visualization and user customization. Implemented progressive disclosure principles to manage complexity while keeping essential metrics readily accessible.",
        features: [
          "Real-time data visualization with charts and graphs",
          "Customizable widget layouts",
          "Advanced filtering and date range selection",
          "Export functionality (PDF, CSV, Excel)",
          "Role-based access controls"
        ],
        image: "images/fintech-dashboard.jpg"
      },
      {
        id: 8,
        title: "Fitness Tracking App",
        category: "mobile",
        tag: "Mobile",
        shortDescription: "iOS and Android fitness tracking application with personalized workout plans and progress monitoring.",
        fullDescription: "Created the complete UX/UI for a fitness tracking mobile app, featuring personalized workout recommendations, progress tracking, and social features. Conducted usability testing with 20+ participants to refine the onboarding flow and workout logging experience.",
        features: [
          "Personalized workout plan generation",
          "Video demonstrations for 200+ exercises",
          "Progress tracking with visual analytics",
          "Social features for accountability",
          "Nutrition tracking and meal planning"
        ],
        image: "images/fitness-app.jpg"
      }
    ];

    // Render projects
    function renderProjects(filter = 'all') {
      const grid = document.getElementById('projectsGrid');
      const filteredProjects = filter === 'all'
        ? projects
        : projects.filter(p => p.category === filter);

      grid.innerHTML = filteredProjects.map(project => `
        <div class="project-card">
          <div class="project-image">
            ${project.image
          ? `<img src="${project.image}" alt="${project.title}">`
          : `<span>Project Image</span>`
        }
            <span class="project-tag">${project.tag}</span>
          </div>
          <div class="project-content">
            <h3 class="project-title">${project.title}</h3>
            <p class="project-description">${project.shortDescription}</p>
            <button class="view-details-btn" onclick="openModal(${project.id})">View Details</button>
          </div>
        </div>
      `).join('');
    }

    // Filter functionality
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', function () {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        renderProjects(this.dataset.filter);
      });
    });

    // Modal functions
    function openModal(projectId) {
      const project = projects.find(p => p.id === projectId);
      if (!project) return;

      document.getElementById('modalTag').textContent = project.tag;
      document.getElementById('modalTitle').textContent = project.title;
      document.getElementById('modalDescription').textContent = project.fullDescription;

      const featuresList = document.getElementById('modalFeatures');
      featuresList.innerHTML = project.features.map(f => `<li>${f}</li>`).join('');

      const modalHeader = document.getElementById('modalHeader');
      modalHeader.innerHTML = project.image
        ? `<img src="${project.image}" alt="${project.title}">`
        : `<span>Project Image</span>`;

      document.getElementById('projectModal').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('projectModal').classList.remove('active');
      document.body.style.overflow = 'auto';
    }

    // Close modal on outside click
    document.getElementById('projectModal').addEventListener('click', function (e) {
      if (e.target === this) {
        closeModal();
      }
    });

    // Close modal on Escape key
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') {
        closeModal();
      }
    });

    // Initial render
    renderProjects();
  </script>
</body>

</html>
